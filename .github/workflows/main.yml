name: Build

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@main

      - name: Setup NuGet
        uses: nuget/setup-nuget@main
        
      - name: Restore NuGet packages
        run: nuget restore ZenStatesDebugTool.sln

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@main

      - name: Install .NET Framework 4.5 reference assemblies
        shell: pwsh
        run: |
          $pkg = "Microsoft.NETFramework.ReferenceAssemblies.net45"
          $ver = "1.0.3"
          $url = "https://www.nuget.org/api/v2/package/$pkg/$ver"

          Invoke-WebRequest -Uri $url -OutFile "$pkg.zip"
          Expand-Archive -Path "$pkg.zip" -DestinationPath "$pkg"

          $source = Resolve-Path "$pkg\build\.NETFramework\v4.5"
          $target = "C:\Program Files (x86)\Reference Assemblies\Microsoft\Framework\.NETFramework\v4.5"

          if (-not (Test-Path $target)) {
            New-Item -Path $target -ItemType Directory -Force | Out-Null
          }

          Copy-Item -Path "$source\*" -Destination $target -Recurse -Force
          Write-Host ".NET 4.5 refs copied"

      - name: Build
        run: |
          msbuild ZenStatesDebugTool.sln `
            /p:Configuration=Release `
            /p:Platform="Any CPU" `
            /m `
            /p:TreatWarningsAsErrors=false `
            /clp:ErrorsOnly

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@main
        with:
          name: SMUDebugTool-Build
          path: bin/Release/
          if-no-files-found: warn
